
server {

    listen 7060;
    server_name localhost;

    root /goinfre/webserv/;
    client_max_body_size 3000000;
    index index.html;
    error_page 404 /error_pages/404.html;
    allowed_methods GET DELETE;

    location / {
        allowed_methods GET;
        autoindex off;
    }
}

server {

    listen 8080;
    server_name localhost;

    root /goinfre/haejeong/webserv_2 2;
    client_max_body_size 3000000;
    index index.html;
    error_page 404 /error_pages/404.html;
    allowed_methods GET POST DELETE;

    location / {
        allowed_methods GET;
        autoindex off;
    }
}
