<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숫자 증가</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        #counter {
            font-size: 2em;
            margin: 20px;
        }
        button {
            font-size: 1em;
            padding: 10px 20px;
        }
    </style>
</head>
<body>
    <div id="counter">0</div>
    <button type="button" onclick="increaseCounter()">숫자 증가</button>

    <script>
        var counter = 0;

        function increaseCounter() {
            counter++;
            document.getElementById('counter').innerText = counter;
            sendCounterToServer(counter);
        }

        function sendCounterToServer(counterValue) {
            var xhr = new XMLHttpRequest();
            xhr.open("POST", "/submit", true);
            xhr.setRequestHeader("Content-Type", "application/x-www-form-urlencoded");
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    console.log("Response received:", xhr.responseText);
                    window.location.href = window.location.href; // 페이지를 다시 로드
                } else if (xhr.readyState === 4) {
                    console.error("Error:", xhr.status, xhr.statusText);
                }
            };
            xhr.send("counter=" + encodeURIComponent(counterValue));
            console.log("Request sent with counter:", counterValue);
        }
    </script>
</body>
</html>
